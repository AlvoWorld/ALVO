<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSYA Agents</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        
        /* Layout */
        .app { display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
        .content { flex: 1; overflow-y: auto; padding: 24px; }
        
        /* Sidebar */
        .logo { padding: 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid var(--border); }
        .logo span { color: var(--accent); }
        .nav { padding: 12px 8px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-dim); transition: all 0.2s; margin-bottom: 2px; }
        .nav-item:hover { background: var(--border); color: var(--text); }
        .nav-item.active { background: var(--accent); color: white; }
        .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
        .nav-badge { margin-left: auto; background: var(--accent); color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
        
        /* Header */
        .header h2 { font-size: 16px; font-weight: 600; }
        .header-actions { margin-left: auto; display: flex; gap: 8px; }
        
        /* Cards */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Agent list */
        .agent-row { display: flex; align-items: center; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .agent-row:hover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
        .agent-status { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; }
        .agent-status.idle { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .agent-status.running { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1.5s infinite; }
        .agent-status.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .agent-info { flex: 1; }
        .agent-name { font-weight: 600; font-size: 14px; }
        .agent-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
        .agent-actions { display: flex; gap: 6px; }
        
        /* Buttons */
        .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { border-color: var(--accent); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: var(--red); color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Tasks */
        .task-row { display: flex; align-items: center; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px; }
        .task-priority { font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-right: 12px; font-weight: 600; }
        .task-priority.high { background: rgba(239,68,68,0.2); color: var(--red); }
        .task-priority.normal { background: rgba(234,179,8,0.2); color: var(--yellow); }
        .task-priority.low { background: rgba(34,197,94,0.2); color: var(--green); }
        .task-info { flex: 1; }
        .task-title { font-weight: 500; font-size: 14px; }
        .task-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
        .task-status { font-size: 12px; padding: 2px 8px; border-radius: 4px; }
        .task-status.todo { background: rgba(59,130,246,0.2); color: var(--accent); }
        .task-status.in_progress { background: rgba(234,179,8,0.2); color: var(--yellow); }
        .task-status.done { background: rgba(34,197,94,0.2); color: var(--green); }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal h3 { font-size: 18px; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-dim); }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
        .form-textarea { min-height: 100px; resize: vertical; font-family: inherit; }
        .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        
        /* Run output */
        .run-output { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; line-height: 1.6; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
        .run-cost { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
        
        /* Empty state */
        .empty { text-align: center; padding: 40px; color: var(--text-dim); }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        
        /* Comments */
        .comment { padding: 12px; border-left: 3px solid var(--border); margin-bottom: 8px; }
        .comment-author { font-weight: 600; font-size: 13px; }
        .comment-time { font-size: 11px; color: var(--text-dim); }
        .comment-text { margin-top: 6px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">🤖 OSYA <span>Agents</span></div>
            <div class="nav">
                <div class="nav-item active" onclick="showPage('dashboard')">
                    <span class="icon">📊</span> Dashboard
                </div>
                <div class="nav-item" onclick="showPage('agents')">
                    <span class="icon">🤖</span> Agents
                    <span class="nav-badge" id="agent-count">0</span>
                </div>
                <div class="nav-item" onclick="showPage('tasks')">
                    <span class="icon">📋</span> Tasks
                    <span class="nav-badge" id="task-count">0</span>
                </div>
                <div class="nav-item" onclick="showPage('runs')">
                    <span class="icon">⚡</span> Runs
                </div>
            </div>
            <div style="padding: 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-dim);">
                v1.0.0 • <span id="cost-total">$0.00</span>
            </div>
        </div>
        
        <!-- Main -->
        <div class="main">
            <div class="header">
                <h2 id="page-title">Dashboard</h2>
                <div class="header-actions">
                    <button class="btn" onclick="refreshAll()">🔄 Refresh</button>
                    <button class="btn btn-primary" id="new-btn" onclick="handleNew()">+ New</button>
                </div>
            </div>
            <div class="content" id="content">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
        <div class="modal" id="modal-content"></div>
    </div>

    <script>
        let currentPage = 'dashboard';
        let agents = [];
        let tasks = [];
        
        // API helpers
        const api = {
            async get(url) {
                const r = await fetch(url);
                return r.json();
            },
            async post(url, data) {
                const r = await fetch(url, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                return r.json();
            },
            async patch(url, data) {
                const r = await fetch(url, {method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                return r.json();
            },
            async delete(url) {
                const r = await fetch(url, {method: 'DELETE'});
                return r.json();
            }
        };
        
        // Navigation
        function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item')?.classList.add('active');
            document.getElementById('page-title').textContent = {dashboard:'Dashboard',agents:'Agents',tasks:'Tasks',runs:'Runs'}[page];
            render();
        }
        
        // Refresh
        async function refreshAll() {
            agents = await api.get('/api/agents');
            tasks = await api.get('/api/tasks');
            document.getElementById('agent-count').textContent = agents.length;
            document.getElementById('task-count').textContent = tasks.filter(t => t.status !== 'done').length;
            let totalCost = 0;
            agents.forEach(a => { if(a.cost_usd) totalCost += a.cost_usd; });
            document.getElementById('cost-total').textContent = `$${totalCost.toFixed(4)}`;
            render();
        }
        
        // Render
        function render() {
            const content = document.getElementById('content');
            if (currentPage === 'dashboard') renderDashboard(content);
            else if (currentPage === 'agents') renderAgents(content);
            else if (currentPage === 'tasks') renderTasks(content);
            else if (currentPage === 'runs') renderRuns(content);
        }
        
        // Dashboard
        function renderDashboard(el) {
            const idle = agents.filter(a => a.status === 'idle').length;
            const running = agents.filter(a => a.status === 'running').length;
            const errors = agents.filter(a => a.status === 'error').length;
            const todoTasks = tasks.filter(t => t.status === 'todo').length;
            
            el.innerHTML = `
                <div class="stats">
                    <div class="stat"><div class="stat-value">${agents.length}</div><div class="stat-label">Agents</div></div>
                    <div class="stat"><div class="stat-value" style="color:var(--green)">${idle}</div><div class="stat-label">Idle</div></div>
                    <div class="stat"><div class="stat-value" style="color:var(--yellow)">${running}</div><div class="stat-label">Running</div></div>
                    <div class="stat"><div class="stat-value" style="color:var(--accent)">${todoTasks}</div><div class="stat-label">Pending Tasks</div></div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title">Agents</div></div>
                    ${agents.map(a => `
                        <div class="agent-row" onclick="showAgentDetail('${a.id}')">
                            <div class="agent-status ${a.status}"></div>
                            <div class="agent-info">
                                <div class="agent-name">${a.name}</div>
                                <div class="agent-meta">${a.model} • ${a.status}</div>
                            </div>
                            <div class="agent-actions">
                                <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); runAgent('${a.name}')">▶ Run</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title">Recent Tasks</div></div>
                    ${tasks.slice(0, 5).map(t => `
                        <div class="task-row">
                            <div class="task-priority ${t.priority}">${t.priority}</div>
                            <div class="task-info">
                                <div class="task-title">${t.title}</div>
                                <div class="task-meta">→ ${t.assignee_name || 'unassigned'}</div>
                            </div>
                            <div class="task-status ${t.status}">${t.status}</div>
                        </div>
                    `).join('') || '<div class="empty"><div class="empty-icon">📋</div>No tasks yet</div>'}
                </div>
            `;
        }
        
        // Agents page
        function renderAgents(el) {
            el.innerHTML = `
                <div class="card">
                    <div class="card-header"><div class="card-title">All Agents</div></div>
                    ${agents.map(a => `
                        <div class="agent-row" onclick="showAgentDetail('${a.id}')">
                            <div class="agent-status ${a.status}"></div>
                            <div class="agent-info">
                                <div class="agent-name">${a.name}</div>
                                <div class="agent-meta">${a.model} • Heartbeat: ${a.heartbeat_sec ? a.heartbeat_sec/60 + 'min' : 'off'}</div>
                            </div>
                            <div class="agent-actions">
                                <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); runAgent('${a.name}')">▶ Run</button>
                                <button class="btn btn-sm" onclick="event.stopPropagation(); editAgent('${a.id}')">✏️</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // Tasks page
        function renderTasks(el) {
            el.innerHTML = `
                <div class="card">
                    <div class="card-header"><div class="card-title">All Tasks</div></div>
                    ${tasks.map(t => `
                        <div class="task-row" onclick="showTaskDetail('${t.id}')">
                            <div class="task-priority ${t.priority}">${t.priority}</div>
                            <div class="task-info">
                                <div class="task-title">${t.title}</div>
                                <div class="task-meta">→ ${t.assignee_name || 'unassigned'} • ${t.created_at?.slice(0,10)}</div>
                            </div>
                            <div class="task-status ${t.status}">${t.status}</div>
                        </div>
                    `).join('') || '<div class="empty"><div class="empty-icon">📋</div>No tasks yet</div>'}
                </div>
            `;
        }
        
        // Runs page
        async function renderRuns(el) {
            el.innerHTML = '<div class="empty"><div class="empty-icon">⚡</div>Run history coming soon</div>';
        }
        
        // Agent detail
        function showAgentDetail(id) {
            const a = agents.find(x => x.id === id);
            if (!a) return;
            const agentTasks = tasks.filter(t => t.assignee_id === id);
            
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = `
                <h3>${a.name}</h3>
                <div style="margin-bottom: 16px;">
                    <div class="agent-status ${a.status}" style="display:inline-block; vertical-align:middle; margin-right:8px"></div>
                    <span>${a.status}</span>
                    <span style="color:var(--text-dim); margin-left:12px">${a.model}</span>
                </div>
                <div class="form-group">
                    <div class="form-label">Instructions</div>
                    <div style="font-size:13px; color:var(--text-dim); max-height:200px; overflow-y:auto; padding:12px; background:var(--bg); border-radius:8px; border:1px solid var(--border)">
                        ${a.instructions || '<i>No instructions</i>'}
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-label">Tasks (${agentTasks.length})</div>
                    ${agentTasks.map(t => `<div style="font-size:13px; padding:4px 0">• ${t.title} <span style="color:var(--text-dim)">[${t.status}]</span></div>`).join('') || '<div style="color:var(--text-dim); font-size:13px">No tasks</div>'}
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="runAgent('${a.name}'); closeModal()">▶ Run Now</button>
                    <button class="btn" onclick="closeModal()">Close</button>
                </div>
            `;
        }
        
        // Task detail
        function showTaskDetail(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = `
                <h3>${t.title}</h3>
                <div style="margin-bottom:16px">
                    <span class="task-priority ${t.priority}">${t.priority}</span>
                    <span class="task-status ${t.status}">${t.status}</span>
                    <span style="color:var(--text-dim); margin-left:12px">→ ${t.assignee_name || 'unassigned'}</span>
                </div>
                <div class="form-group">
                    <div class="form-label">Description</div>
                    <div style="font-size:13px; padding:12px; background:var(--bg); border-radius:8px; border:1px solid var(--border)">
                        ${t.description || '<i>No description</i>'}
                    </div>
                </div>
                <div class="form-actions">
                    ${t.status !== 'done' ? `<button class="btn btn-primary" onclick="updateTask('${t.id}',{status:'done'}); closeModal()">✓ Mark Done</button>` : ''}
                    <button class="btn" onclick="closeModal()">Close</button>
                </div>
            `;
        }
        
        // Run agent
        async function runAgent(name) {
            const message = prompt(`Run ${name} with message (or leave empty for default):`);
            if (message === null) return;
            
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = `
                <h3>Running ${name}...</h3>
                <div class="run-output" id="run-output">Thinking...</div>
            `;
            
            try {
                const result = await api.post(`/api/agents/${name}/run`, {message: message || undefined});
                document.getElementById('run-output').textContent = result.response || result.error || 'No response';
                document.getElementById('modal-content').querySelector('.form-actions')?.remove();
                const actions = document.createElement('div');
                actions.className = 'form-actions';
                actions.innerHTML = `<div class="run-cost">Cost: $${(result.cost_usd || 0).toFixed(6)} • Tokens: ${result.input_tokens || 0}in/${result.output_tokens || 0}out</div><button class="btn" onclick="closeModal()">Close</button>`;
                document.getElementById('modal-content').appendChild(actions);
                refreshAll();
            } catch(e) {
                document.getElementById('run-output').textContent = `Error: ${e.message}`;
            }
        }
        
        // Edit agent
        function editAgent(id) {
            const a = agents.find(x => x.id === id);
            if (!a) return;
            
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = `
                <h3>Edit ${a.name}</h3>
                <div class="form-group">
                    <label class="form-label">Model</label>
                    <select class="form-select" id="edit-model">
                        <option value="xiaomi/mimo-v2-flash" ${a.model==='xiaomi/mimo-v2-flash'?'selected':''}>Xiaomi MiMo Flash (cheap)</option>
                        <option value="xiaomi/mimo-v2-pro" ${a.model==='xiaomi/mimo-v2-pro'?'selected':''}>Xiaomi MiMo Pro</option>
                        <option value="anthropic/claude-sonnet-4" ${a.model==='anthropic/claude-sonnet-4'?'selected':''}>Claude Sonnet 4</option>
                        <option value="google/gemini-2.5-pro" ${a.model==='google/gemini-2.5-pro'?'selected':''}>Gemini 2.5 Pro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Instructions</label>
                    <textarea class="form-textarea" id="edit-instructions" rows="8">${a.instructions || ''}</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Heartbeat (seconds, 0=off)</label>
                    <input type="number" class="form-input" id="edit-heartbeat" value="${a.heartbeat_sec || 0}">
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="saveAgent('${a.id}')">Save</button>
                    <button class="btn" onclick="closeModal()">Cancel</button>
                </div>
            `;
        }
        
        async function saveAgent(id) {
            await api.patch(`/api/agents/${id}`, {
                model: document.getElementById('edit-model').value,
                instructions: document.getElementById('edit-instructions').value,
                heartbeat_sec: parseInt(document.getElementById('edit-heartbeat').value)
            });
            closeModal();
            refreshAll();
        }
        
        // Update task
        async function updateTask(id, data) {
            await api.patch(`/api/tasks/${id}`, data);
            refreshAll();
        }
        
        // New button handler
        function handleNew() {
            if (currentPage === 'agents') showNewAgentModal();
            else if (currentPage === 'tasks') showNewTaskModal();
        }
        
        function showNewAgentModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = `
                <h3>New Agent</h3>
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" id="new-agent-name" placeholder="Agent name">
                </div>
                <div class="form-group">
                    <label class="form-label">Model</label>
                    <select class="form-select" id="new-agent-model">
                        <option value="xiaomi/mimo-v2-flash">Xiaomi MiMo Flash (cheap)</option>
                        <option value="xiaomi/mimo-v2-pro">Xiaomi MiMo Pro</option>
                        <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
                        <option value="google/gemini-2.5-pro">Gemini 2.5 Pro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Instructions</label>
                    <textarea class="form-textarea" id="new-agent-instructions" rows="6" placeholder="Agent instructions..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Reports to</label>
                    <select class="form-select" id="new-agent-reports">
                        <option value="">None (top level)</option>
                        ${agents.map(a => `<option value="${a.name}">${a.name}</option>`).join('')}
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="createAgent()">Create</button>
                    <button class="btn" onclick="closeModal()">Cancel</button>
                </div>
            `;
        }
        
        async function createAgent() {
            await api.post('/api/agents', {
                name: document.getElementById('new-agent-name').value,
                model: document.getElementById('new-agent-model').value,
                instructions: document.getElementById('new-agent-instructions').value,
                reports_to: document.getElementById('new-agent-reports').value || null,
                provider: 'openrouter'
            });
            closeModal();
            refreshAll();
        }
        
        function showNewTaskModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = `
                <h3>New Task</h3>
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" id="new-task-title" placeholder="Task title">
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="new-task-desc" rows="4" placeholder="Task description..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Assign to</label>
                    <select class="form-select" id="new-task-assignee">
                        <option value="">Unassigned</option>
                        ${agents.map(a => `<option value="${a.name}">${a.name}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-select" id="new-task-priority">
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="createTask()">Create</button>
                    <button class="btn" onclick="closeModal()">Cancel</button>
                </div>
            `;
        }
        
        async function createTask() {
            await api.post('/api/tasks', {
                title: document.getElementById('new-task-title').value,
                description: document.getElementById('new-task-desc').value,
                assignee_name: document.getElementById('new-task-assignee').value || null,
                priority: document.getElementById('new-task-priority').value
            });
            closeModal();
            refreshAll();
        }
        
        // Modal
        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modal').style.display = 'none';
        }
        
        // Init
        refreshAll();
        setInterval(refreshAll, 10000); // Auto-refresh every 10s
    </script>
</body>
</html>
