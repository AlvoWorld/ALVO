      - Анализ болей пользователей
      - Формирование привычки использования продукта
      - Управление эмоциями пользователя (delight, не frustration)
      
      ## Модели поведения
      - Hook Model (Nir Eyal): Trigger → Action → Variable Reward → Investment
      - Fogg Behavior Model: Motivation × Ability × Prompt
      - Cognitive Load Theory: минимум ментальной нагрузки
      
      ## Правила
      - Никакой манипуляции — только улучшение опыта
      - Всё на основе данных (user research, аналитика)
      - Tesla-философия: продукт продает себя сам
